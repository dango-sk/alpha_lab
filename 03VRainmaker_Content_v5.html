        {tabs.map(function(t){var a=tab===t.id;var tc={L1:ME,L2:COMP,L3:MKT}[t.id];return <button key={t.id} onClick={function(){setTab(t.id);setSel(null)}} style={{padding:"14px 24px",fontSize:13,fontWeight:600,fontFamily:"inherit",color:a?tc:TX.m,background:"none",border:"none",borderBottom:"2px solid "+(a?tc:"transparent"),cursor:"pointer"}}>{t.label}</button>;})}
      </div>
    </div>

    <div style={{padding:"24px 32px",maxWidth:1400,margin:"0 auto"}}>
      {tab==="L1"&&<TabL1 selectedContent={sel} setSelectedContent={setSel}/>}
      {tab==="L2"&&<TabL2 showCollab={collab} setShowCollab={setCollab}/>}
      {tab==="L3"&&<TabL3/>}
    </div>

    <div style={{textAlign:"center",padding:"24px 32px 12px",borderTop:"1px solid "+CB,fontSize:11,color:TX.m}}>
      V-Rainmaker Content Dashboard · Data as of Feb 12, 2026 · Medicube Red Serum · K-Beauty Serum Market
    </div>
  </div>;
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
